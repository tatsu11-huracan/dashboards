<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>通関ダッシュボード</title>
<style>
:root{--bg:#f4f7fb;--ink:#172033;--muted:#64748b;--line:#d7dee9;--red:#dc2626;--redsoft:#fee2e2;--amber:#d97706;--ambersoft:#fef3c7;--greensoft:#d1fae5;--bluesoft:#dbeafe;--violetsoft:#ede9fe;--shadow:0 16px 40px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 26%,#eef2f7 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}.app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}.nav{background:#111827;color:#e5e7eb;padding:22px 18px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}.brand-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#60a5fa,#22c55e);display:grid;place-items:center;color:#fff}main{padding:24px}.topbar{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0;font-size:28px;letter-spacing:-.03em}.controls{display:flex;gap:8px;flex-wrap:wrap}button,.select-like{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;font-size:13px;color:#334155;cursor:pointer}button.active{background:#111827;color:#fff}.kpis{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 20px rgba(15,23,42,.04)}.kpi .label{font-size:12px;color:var(--muted);margin-bottom:8px}.kpi .value{font-size:28px;font-weight:850}.kpi .delta{font-size:12px;color:var(--muted)}.dash-grid{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(320px,.55fr);gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.card-title{font-size:16px;font-weight:800}.card-note{font-size:12px;color:var(--muted)}.flow-wrap{padding:16px}.flow{display:grid;grid-template-columns:minmax(0,1fr) 88px minmax(0,1fr);gap:12px}.lane{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px;min-height:620px}.lane-title{display:flex;justify-content:space-between;font-weight:800;margin-bottom:12px}.lane-title small{color:var(--muted)}.node{position:relative;background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px;margin-bottom:18px;box-shadow:0 4px 12px rgba(15,23,42,.04)}.node:after{content:"";position:absolute;left:50%;bottom:-19px;height:18px;border-left:2px solid #94a3b8}.node.branch-end:after{display:none}.node-top{display:flex;justify-content:space-between;gap:10px}.node-name{font-weight:800;font-size:14px}.node-meta{font-size:11px;color:var(--muted);margin-top:3px}.badge{border-radius:999px;padding:4px 9px;font-weight:900;font-size:14px}.b-blue{background:var(--bluesoft);color:#1d4ed8}.b-green{background:var(--greensoft);color:#047857}.b-amber{background:var(--ambersoft);color:#b45309}.b-violet{background:var(--violetsoft);color:#6d28d9}.b-slate{background:#e2e8f0;color:#334155}.ok-line,.branches{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.mini,.branch{border-radius:12px;padding:9px;border:1px solid var(--line);font-size:12px;background:#fff}.mini strong,.branch .count{display:block;font-size:18px;font-weight:900}.mini.ok,.branch.permit{background:var(--greensoft)}.mini.ng{background:var(--redsoft)}.branch.alertish{background:#fff7ed;border-color:#fed7aa}.branch .name{font-weight:800;font-size:13px}.branch .status{font-size:12px;color:var(--muted)}.merge{display:flex;align-items:center;justify-content:center;min-height:620px;position:relative}.merge-line{width:100%;height:2px;background:#94a3b8;position:absolute;top:276px}.merge-box{position:absolute;top:230px;width:86px;background:#111827;color:#fff;border-radius:18px;padding:10px 8px;text-align:center;box-shadow:0 10px 26px rgba(17,24,39,.25)}.merge-box .num{font-size:24px;font-weight:900}.merge-box .txt{font-size:11px;color:#cbd5e1}.merge-box:after{content:"";position:absolute;left:50%;bottom:-58px;height:58px;border-left:2px solid #111827}.post-flow{margin-top:18px;background:#fff;border:2px solid #111827;border-radius:18px;padding:12px}.post-title{display:flex;justify-content:space-between;font-weight:900}.side-stack{display:grid;gap:16px}.alert-cards{padding:14px 16px;display:grid;gap:10px}.alert-card{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(15,23,42,.04)}.alert-top{display:flex;justify-content:space-between}.alert-name{font-weight:800;font-size:13px;margin-top:6px}.sev{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800}.urgent{background:var(--redsoft);color:#b91c1c}.watch{background:var(--ambersoft);color:#b45309}.alert-count{font-size:24px;font-weight:900}.alert-count.urgent{color:var(--red)}.alert-count.watch{color:var(--amber)}.alert-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.alert-meta div{background:#f8fafc;border-radius:12px;padding:8px;font-size:12px;color:var(--muted)}.alert-site span{display:block}.alert-link{display:flex;justify-content:space-between;border-top:1px solid #eef2f7;margin-top:9px;padding-top:9px;color:#1d4ed8;font-weight:800;font-size:13px}.route-list{padding:14px 16px;display:grid;gap:10px}.route{border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}.route-head{display:flex;justify-content:space-between;gap:8px;font-weight:800}.route-step{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.55}.route.active{border-color:#2563eb;background:#eff6ff}.timeline{padding:14px 16px}.bar{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#2563eb)}.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;padding:16px}.drawer{margin-left:auto;height:100%;max-width:820px;overflow:auto;background:#fff;border-radius:24px;padding:20px}.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}.detail{border:1px solid var(--line);background:#f8fafc;border-radius:14px;padding:10px}.detail .k{font-size:12px;color:var(--muted);font-weight:800}.detail .v{margin-top:4px;font-weight:800}.cargo-table{width:100%;border-collapse:collapse;font-size:13px}.cargo-table th,.cargo-table td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left}.cargo-table th{font-size:11px;color:var(--muted);background:#f8fafc}@media(max-width:1180px){.app{grid-template-columns:1fr}.nav{display:none}.dash-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}.flow{grid-template-columns:1fr}.merge{min-height:96px}.merge-line,.merge-box:after{display:none}.merge-box{position:static;width:160px}.lane{min-height:auto}}
</style></head>
<body><div class="app"><aside class="nav"><div class="brand"><div class="brand-mark">通</div><div>ESPORIA<br><span style="font-size:12px;color:#94a3b8;font-weight:600">Customs Control</span></div></div></aside><main>
<div class="topbar"><h1>通関ダッシュボード</h1><div class="controls"><button class="active" data-filter="all">全体</button><button data-filter="kansai">関西</button><button data-filter="tokyo">東京</button><span class="select-like">対象日：2026/05/21</span></div></div>
<section class="kpis" id="kpis"></section>
<div class="dash-grid"><section class="card"><div class="card-head"><div><div class="card-title">フロー別ステータス数</div></div><div class="card-note">単位：件</div></div><div id="flowArea"></div></section>
<aside class="side-stack"><section class="card"><div class="card-head"><div><div class="card-title">アラート</div></div></div><div class="alert-cards" id="alertCards"></div></section><section class="card" id="routeCard"><div class="card-head"><div><div class="card-title">予備審査ルート判定</div><div class="card-note">大阪と東京で順序が異なる点を明示</div></div></div><div id="routeArea"></div></section><section class="card"><div class="card-head"><div><div class="card-title">処理進捗</div><div class="card-note">本日対象に対する搬出率</div></div></div><div class="timeline"><div style="display:flex;justify-content:space-between;font-weight:850"><span>搬出済み</span><span id="progressText"></span></div><div class="bar"><span id="progressBar"></span></div></div></section></aside></div></main></div>
<div class="drawer-backdrop" id="drawerBackdrop"><div class="drawer"><button onclick="closeDrawer()" style="float:right;background:#111827;color:#fff">閉じる</button><div id="drawerContent"></div></div></div>
<script>
const DATA={
 all:{total:1284,merged:956,undeclared:74,unpermitted:132,permitted:824,released:768,data:1284,hs:1162,clean:1084,broker:1030,brokerOk:956,naccsPrep:956,ata:1196,olt:1112,out:1034,bin:982,pkg:956,dispose:12,alerts:[12,28,12],sites:[['関西 7','成田/新木場 5'],['関西 18','成田/新木場 10'],['関西 8','成田/新木場 4']],routes:[['大阪/関西：集約利用・通常',488,'1課：HS確認 → 2課：クレンジング → 2課：NACCS'],['大阪/関西：集約非利用',176,'2課：データ入手 → クレンジング → NACCS'],['大阪/関西：特定顧客・点数多い',148,'2課：先に加工 → 1課：HS確認 → 2課：再整備'],['東京/成田・新木場',472,'加工者：クレンジング → 通関士：HS確認/申告判断']]},
 kansai:{total:812,merged:641,undeclared:42,unpermitted:89,permitted:552,released:516,data:812,hs:746,clean:704,broker:683,brokerOk:641,naccsPrep:641,ata:784,olt:728,out:681,bin:655,pkg:641,dispose:8,alerts:[7,18,8],sites:[['関西 7'],['関西 18'],['関西 8']]},
 tokyo:{total:472,merged:315,undeclared:32,unpermitted:43,permitted:272,released:252,data:472,hs:416,clean:380,broker:347,brokerOk:315,naccsPrep:315,ata:412,olt:384,out:353,bin:327,pkg:315,dispose:4,alerts:[5,10,4],sites:[['成田/新木場 5'],['成田/新木場 10'],['成田/新木場 4']]}
};
const fmt=n=>Number(n).toLocaleString('ja-JP');
function kpi(label,key,delta,d){return `<div class="kpi"><div class="label">${label}</div><div class="value">${fmt(d[key])}</div><div class="delta">${delta}</div></div>`}
function node(n,m,c,clr='blue',cls=''){return `<div class="node ${cls}"><div class="node-top"><div><div class="node-name">${n}</div><div class="node-meta">${m}</div></div><span class="badge b-${clr}">${fmt(c)}</span></div></div>`}
function renderFlow(d){return `<div class="flow-wrap"><div class="flow"><div class="lane"><div class="lane-title">予備審査ルート <small>データ処理</small></div>${node('データ受取','API / メール / 2.0',d.data)}${node('HS/アイテムコード','1課・通関士確認',d.hs)}${node('データ加工/クレンジング','名前/住所/価格/重量/品名',d.clean)}<div class="node"><div class="node-top"><div><div class="node-name">通関士チェック</div><div class="node-meta">OK / 未申告在庫へ分岐</div></div><span class="badge b-amber">${fmt(d.broker)}</span></div><div class="ok-line"><div class="mini ok">OK<strong>${fmt(d.brokerOk)}</strong></div><div class="mini ng">未申告在庫<strong>${fmt(d.undeclared)}</strong></div></div></div>${node('NACCS申告準備','予備審査側の合流条件',d.naccsPrep,'green','branch-end')}</div><div class="merge"><div class="merge-line"></div><div class="merge-box"><div class="num">${fmt(d.merged)}</div><div class="txt">3条件完了<br>PKGへ</div></div></div><div class="lane"><div class="lane-title">貨物ルート <small>現物ステータス</small></div>${node('ATA','到着',d.ata,'violet')}${node('OLT','横持ち/搬出手配',d.olt,'violet')}${node('OUT','一次側搬出',d.out,'violet')}${node('BIN','エスポリア側搬入登録',d.bin,'green','branch-end')}<div class="post-flow"><div class="post-title"><span>PKG → 本申告NACCS</span><span class="badge b-slate">${fmt(d.pkg)}</span></div><div class="branches"><div class="branch permit"><div class="name">許可済み</div><div class="count">${fmt(d.permitted)}</div><div class="status">搬出可能</div></div><div class="branch alertish"><div class="name">未許可</div><div class="count">${fmt(d.unpermitted)}</div><div class="status">税関内訳は表示対象外</div></div></div><div class="branches"><div class="branch"><div class="name">滅却予定</div><div class="count">${fmt(d.dispose)}</div><div class="status">終了系</div></div><div class="branch"><div class="name">搬出</div><div class="count">${fmt(d.released)}</div><div class="status">次工程へ</div></div></div></div></div></div></div>`}
function site(s){return s.map(x=>`<span>${x}</span>`).join('')}
function renderAlerts(d){let names=['未申告滞留','未許可滞留','滅却予定 未処理'],types=['即対応','要確認','即対応'],cls=['urgent','watch','urgent'],time=['最長滞留 3h20m','最長滞留 2h10m','期限超過 1d'];return names.map((n,i)=>`<div class="alert-card" onclick="openDrawer(${i})"><div class="alert-top"><div><span class="sev ${cls[i]}">${types[i]}</span><div class="alert-name">${n}</div></div><div style="text-align:right"><div class="alert-count ${cls[i]}">${d.alerts[i]}</div><div style="font-size:12px;color:#64748b">件</div></div></div><div class="alert-meta"><div class="alert-site">${site(d.sites[i])}</div><div>${time[i]}</div></div><div class="alert-link"><span>対象貨物を見る</span><span>›</span></div></div>`).join('')}
function apply(key){const d=DATA[key];document.querySelectorAll('[data-filter]').forEach(b=>b.classList.toggle('active',b.dataset.filter===key));kpis.innerHTML=kpi('本日対象件数','total','データ受取済み',d)+kpi('3条件合流済み','merged','PKGへ進行',d)+kpi('未申告在庫','undeclared','予備審査側で停止',d)+kpi('未許可','unpermitted','本申告後に滞留',d)+kpi('許可済み','permitted','搬出可能',d)+kpi('搬出済み','released','配送/次工程へ',d);flowArea.innerHTML=renderFlow(d);alertCards.innerHTML=renderAlerts(d);routeCard.style.display=key==='all'?'block':'none';routeArea.innerHTML=key==='all'?DATA.all.routes.map((r,i)=>`<div class="route ${i==0?'active':''}"><div class="route-head"><span>${r[0]}</span><span>${r[1]}</span></div><div class="route-step">${r[2]}</div></div>`).join(''):'';let pct=d.released/d.total*100;progressText.textContent=pct.toFixed(1)+'%';progressBar.style.width=pct.toFixed(1)+'%'}
const alertData=[{name:'未申告滞留',type:'即対応',severity:'urgent',count:12,site:'関西 7 / 成田/新木場 5',rows:[['H-KANSAI-260621-001','M-160-77881234','関西','未申告','3h20m'],['H-NARITA-SHINKIBA-260621-022','M-205-44990111','成田/新木場','未申告','2h15m']]},{name:'未許可滞留',type:'要確認',severity:'watch',count:28,site:'関西 18 / 成田/新木場 10',rows:[['H-KANSAI-260621-101','M-160-77887771','関西','未許可','2h10m'],['H-NARITA-SHINKIBA-260621-114','M-205-44994444','成田/新木場','未許可','1h58m']]},{name:'滅却予定 未処理',type:'即対応',severity:'urgent',count:12,site:'関西 8 / 成田/新木場 4',rows:[['H-KANSAI-260621-301','M-160-77112233','関西','滅却予定','期限超過 1d'],['H-NARITA-SHINKIBA-260621-314','M-205-44112233','成田/新木場','滅却予定','期限超過 6h']]}];
function openDrawer(i){const a=alertData[i];const rows=a.rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td></tr>`).join('');drawerContent.innerHTML=`<span class="sev ${a.severity}">${a.type}</span><h2>${a.name}｜対象貨物一覧</h2><div class="detail-grid"><div class="detail"><div class="k">対象件数</div><div class="v">${a.count}件</div></div><div class="detail"><div class="k">拠点別</div><div class="v">${a.site}</div></div><div class="detail"><div class="k">表示条件</div><div class="v">SLA接近または超過</div></div><div class="detail"><div class="k">自動解除条件</div><div class="v">状態解消</div></div></div><table class="cargo-table"><thead><tr><th>ハウスNO</th><th>マスタNO</th><th>拠点</th><th>ステータス</th><th>滞留時間</th></tr></thead><tbody>${rows}</tbody></table>`;drawerBackdrop.style.display='block'}
function closeDrawer(){drawerBackdrop.style.display='none'}drawerBackdrop.addEventListener('click',e=>{if(e.target.id==='drawerBackdrop')closeDrawer()});document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>apply(b.dataset.filter)));apply('all');
</script></body></html>
